name: CI - progress-service

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'
    paths:
      - 'services/progress-service/**'
      - '.github/workflows/ci-progress-service.yml'
      - '.github/workflows/ci-template.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/progress-service/**'
      - '.github/workflows/ci-progress-service.yml'
      - '.github/workflows/ci-template.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-template:
    uses: ./.github/workflows/ci-template.yml
    with:
      service-name: 'progress-service'
      docker-path: 'services/progress-service'
      environment: ${{ github.event_name == 'pull_request' && 'pr' || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'dev') }}
    secrets: inherit
