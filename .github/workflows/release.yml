  update-gitops:
    name: Update ArgoCD GitOps Repository (Prod)
    needs: [build-auth-service, build-chatbot-service, build-diet-service, build-frontend, build-progress-service, build-user-service, build-workout-service, build-yolo-exercise-service]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: FitBuddy-AI-Fitness/fitbuddy-argocd
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Prod Values Files
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd gitops-repo
          SERVICES="auth-service chatbot-service diet-service frontend progress-service user-service workout-service yolo-exercise-service"
          for SERVICE in $SERVICES; do
            echo "Updating prod image tag for $SERVICE to $REF_NAME"
            yq e -i ".image.tag = \"$REF_NAME\"" charts/$SERVICE/values-prod.yaml
            git add charts/$SERVICE/values-prod.yaml
          done
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(gitops): release production image tags to $REF_NAME" && git push origin main)

      - name: Send Email on Pipeline Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
