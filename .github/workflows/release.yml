name: Production Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  build-auth-service:
    name: Build auth-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t local/auth-service:latest services/auth-service

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: 'local/auth-service:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Push to ACR
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          docker tag local/auth-service:latest $ACR_LOGIN_SERVER/auth-service:$REF_NAME
          docker push $ACR_LOGIN_SERVER/auth-service:$REF_NAME
      - name: Send Email on Build/Trivy Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Docker Build or Trivy Scan Failed for auth-service (Prod Release)
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: The Docker Build or Trivy Vulnerability Scan failed for auth-service on branch ${{ github.ref }}.


