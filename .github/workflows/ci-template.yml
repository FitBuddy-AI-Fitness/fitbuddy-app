name: Reusable CI/CD Template

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      docker-path:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  sonarcloud-scan:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=fitbuddy-ai-fitness
            -Dsonar.projectKey=fitbuddy-ai-fitness_fitbuddy-app

  snyk-security-scan:
    name: Snyk Dependency Scan
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Snyk Security Scan Failed in ${{ github.repository }}
          to: ${{ secrets.SMTP_TO }}
          from: GitHub Actions
          body: The Snyk Security Scan failed for ${{ inputs.service-name }} on branch ${{ github.ref }}.

  build-and-trivy:
    name: Build & Scan
    needs: snyk-security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t local/${{ inputs.service-name }}:latest ${{ inputs.docker-path }}

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: 'local/${{ inputs.service-name }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Azure Container Registry Login
        if: inputs.environment == 'dev'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        if: inputs.environment == 'dev'
        run: |
          docker tag local/${{ inputs.service-name }}:latest ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service-name }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service-name }}:${{ github.sha }}

  gitops-update:
    name: Update ArgoCD GitOps Repository (Dev)
    needs: build-and-trivy
    if: inputs.environment == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: FitBuddy-AI-Fitness/fitbuddy-argocd
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Values File
        run: |
          cd gitops-repo
          FILE="charts/${{ inputs.service-name }}/values-dev.yaml"
          TAG="${{ github.sha }}"
          
          yq e -i ".image.tag = \"$TAG\"" $FILE
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add $FILE
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(gitops): update dev image tag for ${{ inputs.service-name }} to $TAG" && git push origin main)
