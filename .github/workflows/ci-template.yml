name: Reusable CI/CD Template

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      docker-path:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  sonarcloud-scan:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=fitbuddy-ai-fitness
            -Dsonar.projectKey=FitBuddy-AI-Fitness_fitbuddy-app
            -Dsonar.qualitygate.wait=true

      - name: Send Email on SonarCloud Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: SonarCloud Code Analysis Failed for ${{ inputs.service-name }}
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: The SonarCloud Code Analysis failed for ${{ inputs.service-name }} on branch ${{ github.ref }}.

  snyk-security-scan:
    name: Snyk Dependency Scan
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Send Email on Snyk Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Snyk Security Scan Failed for ${{ inputs.service-name }}
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: The Snyk Security Scan failed for ${{ inputs.service-name }} on branch ${{ github.ref }}.

  build-and-trivy:
    name: Build & Scan
    needs: snyk-security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t local/${{ inputs.service-name }}:latest ${{ inputs.docker-path }}

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: 'local/${{ inputs.service-name }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Azure Container Registry Login
        if: inputs.environment == 'dev'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        if: inputs.environment == 'dev'
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          GITHUB_SHA_VAR: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA_VAR" | cut -c1-7)
          docker tag local/$SERVICE_NAME:latest $ACR_LOGIN_SERVER/$SERVICE_NAME:$SHORT_SHA
          docker push $ACR_LOGIN_SERVER/$SERVICE_NAME:$SHORT_SHA
      - name: Send Email on Build/Trivy Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Docker Build or Trivy Scan Failed for ${{ inputs.service-name }}
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: The Docker Build or Trivy Vulnerability Scan failed for ${{ inputs.service-name }} on branch ${{ github.ref }}.


  gitops-update:
    name: Update ArgoCD GitOps Repository (Dev)
    needs: build-and-trivy
    if: inputs.environment == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: FitBuddy-AI-Fitness/fitbuddy-argocd
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Values File
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          GITHUB_SHA_VAR: ${{ github.sha }}
        run: |
          cd gitops-repo
          FILE="charts/$SERVICE_NAME/values-dev.yaml"
          TAG=$(echo "$GITHUB_SHA_VAR" | cut -c1-7)
          
          yq e -i ".image.tag = \"$TAG\"" $FILE
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add $FILE
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(gitops): update dev image tag for $SERVICE_NAME to $TAG" && git push origin main)


  notify-success:
    name: Notify Overall Success
    needs: gitops-update
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Email on Pipeline Success
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: CI/CD Pipeline Succeeded for ${{ inputs.service-name }}
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: The entire CI/CD pipeline completed successfully for ${{ inputs.service-name }} on branch ${{ github.ref }}. The image was pushed and ArgoCD was updated.
