name: CI/CD Pipeline - Production Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  sonarcloud-scan:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=fitbuddy-ai-fitness
            -Dsonar.projectKey=fitbuddy-ai-fitness_fitbuddy-app
            -Dsonar.qualitygate.wait=true

  snyk-security-scan:
    name: Snyk Dependency Scan
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        uses: snyk/actions/setup@v4

      - name: Snyk Security Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high

  detect-changes:
    name: Detect Changed Microservices
    needs: snyk-security-scan
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: filter
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA || echo "")
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
              CHANGED_FILES=$(git ls-tree -r --name-only HEAD || echo "")
            else
              CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA || echo "")
            fi
          fi
          
          SERVICES=()
          for file in $CHANGED_FILES; do
            if [[ $file == frontend/* ]]; then SERVICES+=("\"frontend\""); fi
            if [[ $file == services/gateway/* ]]; then SERVICES+=("\"gateway\""); fi
            if [[ $file == services/identity/* ]]; then SERVICES+=("\"identity\""); fi
            if [[ $file == services/auth-service/* ]]; then SERVICES+=("\"auth-service\""); fi
            if [[ $file == services/chatbot-service/* ]]; then SERVICES+=("\"chatbot-service\""); fi
            if [[ $file == services/diet-service/* ]]; then SERVICES+=("\"diet-service\""); fi
            if [[ $file == services/user-service/* ]]; then SERVICES+=("\"user-service\""); fi
            if [[ $file == services/workout-service/* ]]; then SERVICES+=("\"workout-service\""); fi
            if [[ $file == services/progress-service/* ]]; then SERVICES+=("\"progress-service\""); fi
            if [[ $file == services/yolo-exercise-service/* ]]; then SERVICES+=("\"yolo-exercise-service\""); fi
          done
          
          if [ ${#SERVICES[@]} -eq 0 ]; then
            JSON_ARRAY="[]"
          else
            UNIQUE_SERVICES=$(echo "${SERVICES[@]}" | tr ' ' '\n' | sort -u | paste -sd, -)
            JSON_ARRAY="[$UNIQUE_SERVICES]"
          fi
          
          echo "Detected services: $JSON_ARRAY"
          echo "services=$JSON_ARRAY" >> $GITHUB_OUTPUT

  build-scan-push:
    name: Build, Scan & Push to ACR
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          DIR="./services/${{ matrix.service }}"
          if [ "${{ matrix.service }}" = "frontend" ]; then DIR="./frontend"; fi
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.ref_name }} $DIR

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: '${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.ref_name }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.ref_name }}

  gitops-update:
    name: Update ArgoCD GitOps Repository (Prod)
    needs: [detect-changes, build-scan-push]
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: FitBuddy-AI-Fitness/fitbuddy-argocd
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Prod Values Files
        run: |
          cd gitops-repo
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          SERVICE_ARRAY=$(echo $SERVICES | jq -r '.[]')
          
          for SERVICE in $SERVICE_ARRAY; do
            echo "Updating tag for $SERVICE to ${{ github.ref_name }} in prod environment"
            yq e -i ".image.tag = \"${{ github.ref_name }}\"" charts/${SERVICE}/values-prod.yaml
          done

      - name: Commit and Push Changes
        run: |
          cd gitops-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add charts/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(gitops): release production image tags to ${{ github.ref_name }}" && git push origin main)
