name: CI/CD Pipeline - Production Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  security-events: write

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  sonarcloud-scan:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=fitbuddy-ai-fitness
            -Dsonar.projectKey=fitbuddy-ai-fitness_fitbuddy-app
            -Dsonar.qualitygate.wait=true

  snyk-security-scan:
    name: Snyk Dependency Scan
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Snyk Security Scan Failed in ${{ github.repository }}
          to: ${{ secrets.SMTP_TO }}
          from: GitHub Actions
          body: The Snyk Security Scan failed on branch ${{ github.ref }}. Please review the Security tab for details.

  build-scan-push:
    name: Build, Scan & Push to ACR
    needs: snyk-security-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: 
          - frontend
          - gateway
          - identity
          - auth-service
          - chatbot-service
          - diet-service
          - user-service
          - workout-service
          - progress-service
          - yolo-exercise-service
      fail-fast: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          DIR="./services/${{ matrix.service }}"
          if [ "${{ matrix.service }}" = "frontend" ]; then DIR="./frontend"; fi
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.ref_name }} $DIR

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: '${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.ref_name }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.ref_name }}

  gitops-update:
    name: Update ArgoCD GitOps Repository (Prod)
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: FitBuddy-AI-Fitness/fitbuddy-argocd
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Prod Values Files
        run: |
          cd gitops-repo
          SERVICES="frontend gateway identity auth-service chatbot-service diet-service user-service workout-service progress-service yolo-exercise-service"
          
          for SERVICE in $SERVICES; do
            echo "Updating tag for $SERVICE to ${{ github.ref_name }} in prod environment"
            yq e -i ".image.tag = \"${{ github.ref_name }}\"" charts/${SERVICE}/values-prod.yaml
          done

      - name: Commit and Push Changes
        run: |
          cd gitops-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add charts/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(gitops): release production image tags to ${{ github.ref_name }}" && git push origin main)
