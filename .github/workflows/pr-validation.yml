name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  pr-sonar-snyk-scan:
    name: Monolithic PR Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216 # v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=fitbuddy-ai-fitness
            -Dsonar.projectKey=FitBuddy-AI-Fitness_fitbuddy-app
            -Dsonar.qualitygate.wait=true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install Snyk CLI
        run: npm install -g snyk@1.1292.1 --ignore-scripts

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: snyk.sarif

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@4226df7daafa6fc901a43789c49bf7ab309066e7 # v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: PR Validation Failed (Sonar/Snyk) on ${{ github.repository }}
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: The Monolithic PR Validation pipeline (SonarCloud or Snyk) failed for Pull Request #${{ github.event.pull_request.number }}. Please review the logs to fix the vulnerabilities before merging to main.

      - name: Send Email on Success
        if: success()
        uses: dawidd6/action-send-mail@4226df7daafa6fc901a43789c49bf7ab309066e7 # v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ PR Validation Successful: Ready to Merge!"
          to: ${{ secrets.TEAM_EMAIL }}
          from: GitHub Actions
          body: |
            Great news! The Monolithic PR Validation pipeline has successfully completed for Pull Request #${{ github.event.pull_request.number }}.
            
            Both SonarCloud (Code Quality) and Snyk (Dependency Security) scans have passed with zero new critical vulnerabilities. The code meets all enterprise security standards and the branch protection checks are now green. 
            
            This Pull Request is officially verified and is ready to be safely merged into the main branch!
