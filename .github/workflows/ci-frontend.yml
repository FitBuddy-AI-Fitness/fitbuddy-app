name: CI - frontend

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/workflows/ci-template.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/workflows/ci-template.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-template:
    uses: ./.github/workflows/ci-template.yml
    with:
      service-name: 'frontend'
      docker-path: 'frontend'
      environment: ${{ github.event_name == 'pull_request' && 'pr' || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'dev') }}
    secrets: inherit
